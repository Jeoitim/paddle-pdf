[workspace]
name = "paddle-pdf"
version = "1.0.0"
description = "PDF OCR tool with GUI (pytauri) powered by PaddleOCR"
channels = ["conda-forge"]
platforms = ["win-64"]

[dependencies]
python = ">=3.10,<3.13"
pillow = ">=10.0.0"
tqdm = ">=4.66.0"
nodejs = ">=20"
pnpm = ">=9"

[pypi-options]
extra-index-urls = ["https://www.paddlepaddle.org.cn/packages/stable/cu126/"]
index-strategy = "unsafe-best-match"

[pypi-dependencies]
paddlepaddle-gpu = "==3.3.0"
paddleocr = "==3.4.1"
pymupdf = ">=1.25.0"
pdf2image = ">=1.17.0"
pytauri = ">=0.4"
anyio = ">=4"

[feature.gui]
pypi-dependencies = { pytauri = ">=0.4", anyio = ">=4" }

[feature.dev]
dependencies = { black = ">=24.0", ruff = ">=0.4.0" }

[environments]
default = { solve-group = "default" }
gui = { features = ["gui"], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }

[tasks]
# CLI
run = "python -m paddle_pdf"
run-gpu = "python -m paddle_pdf -gpu"
check-gpu = "python check_gpu_env.py"

# Frontend (run from src-frontend/)
frontend-install = { cmd = "pnpm install", cwd = "src-frontend" }
frontend-dev = { cmd = "pnpm dev", cwd = "src-frontend" }
frontend-build = { cmd = "pnpm build", cwd = "src-frontend" }

# Tauri (requires Rust toolchain)
# PYO3_PYTHON: points Cargo to pixi's Python 3.12
# PYTHONPATH:  ensures the embedded Python can find paddle_pdf package
tauri-dev = { cmd = "pnpm tauri dev", cwd = "src-frontend", env = { PYO3_PYTHON = "python", PYTHONPATH = "../src" } }
tauri-build = { cmd = "pnpm tauri build", cwd = "src-frontend", env = { PYO3_PYTHON = "python", PYTHONPATH = "../src" } }

# Dev tools
lint = "ruff check ."
format = "black ."
